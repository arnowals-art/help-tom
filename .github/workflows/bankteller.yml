# Werkt elk uur de bankteller bij: haalt ontvangen donaties op via
# GoCardless Bank Account Data en publiceert bank.json op de
# "data"-branch. De site leest dat bestand voor de teller.
#
# Handmatig draaien: GitHub → Actions → "Bankteller bijwerken" →
# Run workflow.

name: Bankteller bijwerken

on:
  schedule:
    - cron: '7 * * * *' # elk uur, 7 minuten na het hele uur
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bankteller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Transacties ophalen en optellen
        env:
          GC_SECRET_ID: ${{ secrets.GC_SECRET_ID }}
          GC_SECRET_KEY: ${{ secrets.GC_SECRET_KEY }}
          GC_ACCOUNT_ID: ${{ secrets.GC_ACCOUNT_ID }}
          START_DATE: '2026-07-07'
          FILTER_KEYWORD: ${{ vars.FILTER_KEYWORD || '' }}
        run: node scripts/update-bank.js

      - name: Publiceer bank.json naar de data-branch
        run: |
          mkdir out
          cp bank.json out/
          cd out
          git init -b data
          git config user.name "bankteller-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bank.json
          git commit -m "Bankstand $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" data
